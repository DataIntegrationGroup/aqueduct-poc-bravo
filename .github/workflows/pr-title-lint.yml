# Enforces Conventional Commits on PR titles so squash-merged commits drive
# release-please correctly.
# https://github.com/amannn/action-semantic-pull-request

name: pr-title-lint

on:
  pull_request:
    types:
      - opened
      - edited
      - reopened
      - synchronize

jobs:
  pr-title:
    name: Validate PR title
    runs-on: ubuntu-latest
    permissions:
      pull-requests: read
    steps:
      - uses: amannn/action-semantic-pull-request@v6
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          types: |
            feat
            fix
            perf
            docs
            chore
            refactor
            test
            ci
            build
            style
            revert
            deps
          requireScope: false
          subjectPattern: ^(?![A-Z]).+$
          subjectPatternError: |
            PR title subject must start with a lowercase letter.
            Example: `feat: add hydrovu location filtering`
